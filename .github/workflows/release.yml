name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'patch / minor / major (default: patch)'
        required: false
        default: patch

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true
          token: ${{ github.token }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci --ignore-scripts
      - name: Compute next version, tag, push
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1 | sed 's/^v//')
          if [ -n "$LATEST" ]; then
            npm version "$LATEST" --no-git-tag-version 2>/dev/null || true
          fi
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release
        run: gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
