name: Deprecate test versions
on:
  workflow_dispatch:
jobs:
  deprecate:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: |
          npm deprecate homebridge-ac-http@0.0.1 "Test version, do not use"
          npm deprecate homebridge-ac-http@0.0.2 "Test version, do not use"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
